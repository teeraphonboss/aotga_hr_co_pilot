<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOTGA HR AI Agent — ระบบผู้ช่วยประเมินผลพนักงาน</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#003087;--blue:#0066CC;--lblue:#D6E4F0;--xlblue:#EEF6FB;
  --green:#059669;--lgreen:#D1FAE5;--gold:#F59E0B;--lgold:#FEF3C7;
  --red:#DC2626;--lred:#FEE2E2;--gray:#6B7280;--lgray:#F3F4F6;
  --dark:#1F2937;--white:#FFFFFF;
  --r1:#D1FAE5;--r2:#EEF6FB;--r3:#FEF3C7;--r4:#FDE8D8;--r5:#FEE2E2;
}
body{font-family:'Sarabun',Arial,sans-serif;background:#F0F4F8;height:100vh;display:flex;flex-direction:column}
/* HEADER */
.header{background:var(--navy);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header .logo{width:36px;height:36px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--navy)}
.header h1{color:#fff;font-size:16px;font-weight:700}
.header p{color:#9BBBDF;font-size:12px}
.header .badge{margin-left:auto;background:#0066CC;color:#fff;padding:4px 10px;border-radius:12px;font-size:11px}
/* CHAT AREA */
.chat-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
/* MESSAGES */
.msg{display:flex;gap:10px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.avatar.ai{background:var(--navy);color:#fff}
.avatar.user{background:var(--blue);color:#fff}
.bubble{max-width:78%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6}
.bubble.ai{background:#fff;border:1px solid #e2e8f0;border-radius:4px 16px 16px 16px;color:var(--dark)}
.bubble.user{background:var(--navy);color:#fff;border-radius:16px 4px 16px 16px}
/* RICH CONTENT */
.kpi-card{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.kcard{background:var(--xlblue);border:1px solid var(--lblue);border-radius:10px;padding:10px 14px;min-width:120px;flex:1}
.kcard .label{font-size:11px;color:var(--gray);margin-bottom:4px}
.kcard .val{font-size:20px;font-weight:700;color:var(--navy)}
.kcard .sub{font-size:11px;color:var(--blue)}
.kcard.green{background:var(--lgreen);border-color:#86EFAC} .kcard.green .val{color:var(--green)}
.kcard.gold{background:var(--lgold);border-color:#FCD34D} .kcard.gold .val{color:var(--gold)}
.kcard.red{background:var(--lred);border-color:#FCA5A5} .kcard.red .val{color:var(--red)}
/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.data-table th{background:var(--navy);color:#fff;padding:7px 10px;text-align:left;font-size:12px}
.data-table td{padding:6px 10px;border-bottom:1px solid #E5E7EB}
.data-table tr:nth-child(even) td{background:var(--xlblue)}
.data-table tr:hover td{background:var(--lblue)}
/* RATING BADGE */
.badge-r1{background:var(--r1);color:#065F46;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-r2{background:var(--r2);color:#1E40AF;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-r3{background:var(--r3);color:#92400E;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-r4{background:var(--r4);color:#9A3412;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-r5{background:var(--r5);color:#991B1B;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-dept{background:var(--navy);color:#fff;padding:2px 7px;border-radius:10px;font-size:10px}
/* CHART CONTAINER */
.chart-box{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin:10px 0}
.chart-box h4{font-size:13px;color:var(--navy);margin-bottom:10px;font-weight:700}
.chart-box canvas{max-height:220px}
/* PROGRESS */
.prog-wrap{margin:6px 0}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:3px}
.prog-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden}
.prog-bar .fill{height:100%;border-radius:4px;transition:width .6s ease}
/* QUICK ACTIONS */
.quick-btns{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.qbtn{background:var(--xlblue);border:1px solid var(--lblue);color:var(--navy);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:.2s}
.qbtn:hover{background:var(--navy);color:#fff}
/* SECTION HEADER */
.sec-hdr{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:10px 14px;border-radius:10px;margin:10px 0;display:flex;align-items:center;gap:8px}
.sec-hdr .icon{font-size:18px}
.sec-hdr h3{font-size:14px;font-weight:700}
.sec-hdr p{font-size:11px;opacity:.8}
/* DIVIDER */
.divider{border:none;border-top:1px dashed #CBD5E0;margin:10px 0}
/* EMP PROFILE */
.emp-profile{background:linear-gradient(135deg,var(--navy),#0052A5);color:#fff;border-radius:12px;padding:14px;margin:8px 0;display:flex;align-items:center;gap:14px}
.emp-avatar{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.emp-info h3{font-size:15px;font-weight:700}
.emp-info p{font-size:12px;opacity:.8}
.emp-info .tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.emp-info .tag{background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:11px}
/* TYPING */
.typing{display:flex;gap:4px;align-items:center;padding:8px}
.typing span{width:7px;height:7px;background:var(--blue);border-radius:50%;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1}}
/* INPUT */
.input-area{background:#fff;border-top:1px solid #E2E8F0;padding:14px 20px;flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end;max-width:900px;margin:0 auto}
.input-row textarea{flex:1;border:1.5px solid #CBD5E0;border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:120px;transition:.2s}
.input-row textarea:focus{border-color:var(--navy)}
.input-row button{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:10px 18px;cursor:pointer;font-size:16px;transition:.2s;min-height:44px}
.input-row button:hover{background:var(--blue)}
.hint{text-align:center;font-size:11px;color:var(--gray);margin-top:6px}
/* RESPONSIVE */
@media(max-width:600px){.bubble{max-width:90%}.kcard{min-width:100%}}
</style>
</head>

function detectYear(q){
  if(q.includes("2566")||q.includes("66")) return "ปี 2566";
  if(q.includes("2568")||q.includes("68")||q.includes("ล่าสุด")||q.includes("ปัจจุบัน")) return "ปี 2568";
  return "ปี 2567";
}

function detectDept(q){
  if(q.includes("flt")||q.includes("flight")||q.includes("บิน")||q.includes("dispatcher")||q.includes("load control")) return "FLT";
  if(q.includes("rmp")||q.includes("ramp")||q.includes("ลานจอด")) return "RMP";
  if(q.includes("pax")||q.includes("passenger")||q.includes("ผู้โดยสาร")||q.includes("psa")) return "PAX";
  if(q.includes("cgo")||q.includes("cargo")||q.includes("สินค้า")) return "CGO";
  if(q.includes("tss")||q.includes("ทำความสะอาด")||q.includes("clean")) return "TSS";
  if(q.includes("hr")||q.includes("บุคคล")) return "HR";
  return null;
}

function findEmp(q){
  const qLow = q.toLowerCase();
  return EMPS.find(e => {
    const name = (e.name||"").toLowerCase();
    const id = (e.id||"").toLowerCase();
    const pos = (e.pos||"").toLowerCase();
    // check partial name match
    const parts = name.split(" ");
    return parts.some(p=>p&&qLow.includes(p)) || qLow.includes(id) ||
      qLow.includes(name) || qLow.includes(pos.split("(")[0].trim().toLowerCase());
  });
}

function processQuery(q){
  const ql = q.toLowerCase();

  // ── HELP / GREETING
  if(ql.match(/สวัสดี|hello|hi|ทำอะไรได้|ช่วยอะไรได้|เมนู|คำสั่ง/)){
    return renderHelp();
  }
  // ── OVERVIEW / DASHBOARD
  if(ql.match(/ภาพรวม|overview|dashboard|สรุป.*ทั้งหมด|ทั้งองค์กร/)){
    const year = detectYear(q);
    return renderOrgOverview(year);
  }
  // ── RANKING / TOP / BOTTOM
  if(ql.match(/อันดับ|ranking|top|สูงสุด|ดีที่สุด|เก่งที่สุด/)){
    const year = detectYear(q);
    return renderTopPerformers(year, "top");
  }
  if(ql.match(/ต่ำสุด|แย่|pip|ต้องปรับปรุง|needs improvement/)){
    const year = detectYear(q);
    return renderTopPerformers(year, "bottom");
  }
  // ── DEPT ANALYSIS
  if(ql.match(/เปรียบเทียบ|compare|แต่ละแผนก|ทุกแผนก/)){
    const year = detectYear(q);
    return renderDeptCompare(year);
  }
  // ── DEPT SPECIFIC
  const dept = detectDept(q);
  if(dept && ql.match(/แผนก|ทีม|team|department|พนักงาน.*แผนก/)){
    const year = detectYear(q);
    return renderDeptDetail(dept, year);
  }
  // ── KPI ANALYSIS
  if(ql.match(/kpi|ตัวชี้วัด|otp|mbi|safety|ความปลอดภัย|baggage|สัมภาระ|turnaround/)){
    const year = detectYear(q);
    const emp = findEmp(q);
    if(emp) return renderEmpKPI(emp.id, year);
    return renderKPIOverview(year);
  }
  // ── TREND / HISTORY
  if(ql.match(/แนวโน้ม|trend|3 ปี|ย้อนหลัง|เปลี่ยนแปลง|พัฒนาการ/)){
    const emp = findEmp(q);
    if(emp) return renderEmpTrend(emp.id);
    return renderOrgTrend();
  }
  // ── IDP
  if(ql.match(/idp|พัฒนา|development|อบรม|training|แผนพัฒนา/)){
    const emp = findEmp(q);
    const year = detectYear(q);
    if(emp) return renderEmpIDP(emp.id, year);
    return renderIDPOverview(year);
  }
  // ── COMPETENCY / CORE VALUES
  if(ql.match(/competency|core value|aotga values|ค่านิยม|สมรรถนะ|พฤติกรรม|achievement|openness|teamwork|goodwill|agility/)){
    const emp = findEmp(q);
    const year = detectYear(q);
    if(emp) return renderEmpComp(emp.id, year);
    return renderCompOverview(year);
  }
  // ── MERIT / BONUS
  if(ql.match(/merit|bonus|ขึ้นเงิน|เงินเดือน|โบนัส|ค่าตอบแทน/)){
    const year = detectYear(q);
    return renderMeritBonus(year);
  }
  // ── YEAR SUMMARY
  if(ql.match(/ปี 25[6-9][0-9]|ปี.*สรุป|สรุปปี|ผลปี/)){
    const year = detectYear(q);
    return renderYearSummary(year);
  }
  // ── EMPLOYEE SEARCH / PROFILE
  const emp = findEmp(q);
  if(emp){
    const year = detectYear(q);
    return renderEmpProfile(emp.id, year);
  }
  // ── LIST EMPLOYEES
  if(ql.match(/รายชื่อ|list|พนักงานทั้งหมด|ทุกคน|ทั้งหมด/)){
    return renderEmpList();
  }
  // ── DEFAULT
  return renderDefault(q);
}

function renderKPIOverview(year){
  const ks = KPIS.filter(k=>k.year===year);
  const dims = ["1. Finance","2. Process","3. Customer","4. People"];
  return `
<div class="sec-hdr"><span class="icon">🎯</span><div><h3>KPI Overview ${year}</h3><p>สรุปผล KPI รายมิติ</p></div></div>
${dims.map(dim=>{
  const dk = ks.filter(k=>k.dim===dim);
  if(!dk.length) return "";
  const avg = dk.reduce((a,k)=>a+k.avg_pct,0)/dk.length;
  const top = [...dk].sort((a,b)=>b.avg_pct-a.avg_pct)[0];
  const low = [...dk].sort((a,b)=>a.avg_pct-b.avg_pct)[0];
  return `<div style="background:var(--xlblue);border-radius:8px;padding:10px 14px;margin:6px 0">
<b style="color:var(--navy)">${dim}</b> — เฉลี่ย <b style="color:${pct2color(avg)}">${avg.toFixed(1)}%</b>
${progBar(avg)}
<div style="font-size:11px;color:var(--gray);margin-top:4px">
🏆 KPI ที่ดีที่สุด: ${top?.kpi_name} (${top?.avg_pct.toFixed(1)}%)<br>
⚠️ ต้องพัฒนา: ${low?.kpi_name} (${low?.avg_pct.toFixed(1)}%)
</div></div>`;
}).join("")}
<div class="quick-btns">
  <button class="qbtn" onclick="qask('ภาพรวม OTP และ Safety ปี ${year.replace("ปี ","")}')">✈️ Safety & OTP</button>
</div>`;
}

  return `

function renderMeritBonus(year){
  const ys = SUMMARY.filter(s=>s.year===year);
  const meritGroups = {};
  ys.forEach(s=>{
    const m = s.merit;
    if(!meritGroups[m]) meritGroups[m]={count:0, emps:[]};
    meritGroups[m].count++;
    meritGroups[m].emps.push(s.name);
  });
  return `
<div class="sec-hdr"><span class="icon">💰</span><div><h3>Merit Increase & Bonus ${year}</h3><p>การปรับเงินเดือนและโบนัสตามผลประเมิน</p></div></div>
<table class="data-table">
  <tr><th>Merit Increase</th><th>จำนวนพนักงาน</th><th>สัดส่วน</th><th>ระดับที่ได้</th></tr>
  ${Object.entries(meritGroups).sort((a,b)=>parseInt(b[0])-parseInt(a[0])).map(([m,g])=>`
  <tr>
    <td><b>${m}</b></td>
    <td>${g.count} คน</td>
    <td>${(g.count/ys.length*100).toFixed(1)}%</td>
    <td>${g.emps.slice(0,3).join(", ")}${g.emps.length>3?"...":""}</td>
  </tr>`).join("")}
</table>
<table class="data-table" style="margin-top:10px">
  <tr><th>ชื่อ</th><th>ระดับ</th><th>Merit %</th><th>Bonus</th><th>ผลประเมิน</th></tr>
  ${ys.sort((a,b)=>b.total-a.total).slice(0,10).map(s=>`

</table>`;
}

function renderYearSummary(year){
  const ys = SUMMARY.filter(s=>s.year===year);
  const avg = ys.reduce((a,s)=>a+s.total,0)/ys.length;
  const prevYear = year==="ปี 2566"?null:year==="ปี 2567"?"ปี 2566":"ปี 2567";
  const prev = prevYear?SUMMARY.filter(s=>s.year===prevYear):[];
  const prevAvg = prev.length?prev.reduce((a,s)=>a+s.total,0)/prev.length:null;
  const change = prevAvg!==null?avg-prevAvg:null;
  return `
<div class="sec-hdr"><span class="icon">📅</span><div><h3>สรุปผลการประเมิน ${year}</h3><p>ภาพรวมองค์กร AOTGA</p></div></div>
<div class="kpi-card">
  <div class="kcard"><div class="label">พนักงานที่ประเมิน</div><div class="val">${ys.length}</div><div class="sub">คน</div></div>
  <div class="kcard"><div class="label">คะแนนเฉลี่ย</div><div class="val">${avg.toFixed(1)}</div><div class="sub">${change!==null?`เปลี่ยน ${change>0?"+":""}${change.toFixed(1)} จากปีก่อน`:""}</div></div>
  <div class="kcard green"><div class="label">Outstanding+Exceeds</div><div class="val">${ys.filter(s=>s.level>=4).length}</div><div class="sub">คน (${(ys.filter(s=>s.level>=4).length/ys.length*100).toFixed(0)}%)</div></div>
  <div class="kcard red"><div class="label">Needs PIP</div><div class="val">${ys.filter(s=>s.level<=2).length}</div><div class="sub">คน</div></div>
</div>
${renderOrgOverview(year).split('<div class="sec-hdr"')[1].split("</div>").slice(3).join("</div>")}`;
}
